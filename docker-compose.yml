version: '3.8'
services:
  backend:
    build: .
    command: uvicorn backend:app --host 0.0.0.0 --port 8000
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
  
  frontend:
    build: .
    command: streamlit run frontend.py --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - backend

