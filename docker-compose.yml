version: "3.9"

services:

  backend:
    build: .
    container_name: mt_backend

    command: uvicorn backend:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: always

  frontend:
    build: .

    container_name: mt_frontend

    command: streamlit run frontend.py --server.port 8501 --server.address=0.0.0.0

    ports:
      - "8501:8501"

    depends_on:
      - backend

    restart: always
