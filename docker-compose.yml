version: "3.9"

services:
  backend:
    container_name: mt-career-backend
    build: .
    command: uvicorn backend:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    container_name: mt-career-frontend
    build: .
    command: streamlit run frontend.py --server.address=0.0.0.0 --server.port=8501
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped
